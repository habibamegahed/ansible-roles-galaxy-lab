---
- name: Configure web servers
  hosts: webservers
  become: true

  roles:
    - role: nginx
      vars:
        nginx_port: 80

- name: Configure DB servers
  hosts: dbservers
  become: true

  vars:
    mysql_root_password: "SecurePass123"
    mysql_databases:
      - name: appdb

    mysql_users:
      - name: appuser
        host: "%"
        password: "AppPass123"
        priv: "appdb.*:ALL"

  roles:
    - role: geerlingguy.mysql
